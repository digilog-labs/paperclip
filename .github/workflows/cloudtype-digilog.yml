# Optional: deploy digilog-labs/paperclip to Cloudtype with Dockerfile.cloudtype.
# Setup: repo Secrets CLOUDTYPE_TOKEN, GHP_TOKEN — then set "project" below.
name: Deploy to Cloudtype (Digilog)

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "doc/**"
      - "docs/**"
      - "*.md"

jobs:
  deploy:
    if: ${{ secrets.CLOUDTYPE_TOKEN != '' && vars.CLOUDTYPE_PROJECT != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connect deploy key
        uses: cloudtype-github-actions/connect@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          ghtoken: ${{ secrets.GHP_TOKEN }}

      - name: Deploy (Dockerfile.cloudtype)
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: ${{ vars.CLOUDTYPE_PROJECT }}
          file: ./cloudtype.yaml
